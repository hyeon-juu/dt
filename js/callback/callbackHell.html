<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="result"></div>
    <script>
        const result = document.querySelector("#result");
        function eat(callback) {
            setTimeout(() => {
                result.innerHTML += `<p> 밥을 먹어요</p>`;
                callback();
            }, 1000);
        }
        function drink(callback) {
            setTimeout(() => {
                result.innerHTML += `<p> 물을 마셔요</p>`;
                callback();
            }, 1000);
        }
        function cleanTable(callback) {
            setTimeout(() => {
                result.innerHTML += `<p> 밥그릇을 치워요</p>`;
                callback();
            }, 1000);
        }
        function wash(callback) {
            setTimeout(() => {
                result.innerHTML += `<p> 설거지를 해요</p>`;
                callback();
            }, 1000);
        }
        eat(() => {
            drink(() => {
                cleanTable(() => {
                    wash(() => {
                        result.innerHTML += `<p>종료</p>`;
                    });
                });
            });
        });
    </script>
</body>

</html>
